version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: yt_retention_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: youtube_creator_retention
      MYSQL_USER: yt_user
      MYSQL_PASSWORD: yt_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
